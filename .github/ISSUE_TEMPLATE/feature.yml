name: Feature
description: Product capability; sub-issue of an epic
labels: ["feature", "planned"]
body:
  - type: input
    id: parent_epic
    attributes:
      label: Parent Epic
      placeholder: "#123"
    validations:
      required: true
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What capability does this feature add?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What is explicitly in scope for this feature?
  - type: textarea
    id: out_of_scope
    attributes:
      label: Out of Scope
      description: What is explicitly excluded from this feature?
  - type: textarea
    id: stories
    attributes:
      label: Stories
      description: Add story issue refs once created (one per line)
  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
    validations:
      required: true
  - type: textarea
    id: references
    attributes:
      label: References
      description: |
        Non-numbered markdown list of markdown URLs to relevant files or sections in /docs.
        Each item MUST be a markdown link — plain text paths are not accepted.
        Features may reference entire documents or first-level headings (broad, overarching scope).

        ✅ Correct:
        - [SDS Data Layer](./docs/02-technical/sds.md#3-data-layer)
        - [UX Flows](./docs/02-technical/ux-flows.md)

        ❌ Incorrect:
        - SDS Data Layer
        - docs/02-technical/ux-flows.md
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options: ["p0", "p1", "p2", "p3", "p4", "p5"]
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
