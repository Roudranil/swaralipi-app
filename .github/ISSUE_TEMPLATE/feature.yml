name: Feature
description: Product capability; sub-issue of an epic
labels: ["feature", "planned"]
body:
  - type: input
    id: parent_epic
    attributes:
      label: Parent Epic
      placeholder: "#123"
    validations:
      required: true
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What capability does this feature add?
    validations:
      required: true
  - type: textarea
    id: stories
    attributes:
      label: Stories
      description: Add story issue refs once created (one per line)
  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options: ["p0", "p1", "p2", "p3", "p4", "p5"]
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
