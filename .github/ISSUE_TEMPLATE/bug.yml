name: Bug
description: Defect — functional regression or crash
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One-sentence description
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      value: "Device: Samsung Galaxy S25\nFlutter version:\nApp version:"
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Severity / Priority
      options: ["p0", "p1", "p2", "p3", "p4", "p5"]
    validations:
      required: true
  - type: input
    id: linked
    attributes:
      label: Linked Issue (optional)
      placeholder: "#123"
  - type: textarea
    id: references
    attributes:
      label: References
      description: Links to relevant sections or files in /docs (one per line)
  - type: textarea
    id: notes
    attributes:
      label: Notes
