name: Bug
description: Defect — functional regression or crash
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One-sentence description
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      value: "Device: Samsung Galaxy S25\nFlutter version:\nApp version:"
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Severity / Priority
      options: ["p0", "p1", "p2", "p3", "p4", "p5"]
    validations:
      required: true
  - type: input
    id: linked
    attributes:
      label: Linked Issue (optional)
      placeholder: "#123"
  - type: textarea
    id: references
    attributes:
      label: References
      description: |
        Non-numbered markdown list of markdown URLs to relevant files or sections in /docs.
        Each item MUST be a markdown link — plain text paths are not accepted.
        Bugs MUST NOT reference entire documents. References must point to the most granular
        section or subheading describing the expected behavior or affected component.
        The list must be comprehensive — a developer agent reading only these references
        must understand what correct behavior looks like and where the bug likely originates.

        ✅ Correct:
        - [SDS §4.1.2 Error handling in CameraRepository](./docs/02-technical/sds.md#412-error-handling)
        - [UX Flows — expected camera permission prompt](./docs/02-technical/ux-flows.md#camera-permission-prompt)

        ❌ Incorrect:
        - docs/02-technical/sds.md (entire doc)
        - SDS section 4 (plain text, no link)
  - type: textarea
    id: notes
    attributes:
      label: Notes
