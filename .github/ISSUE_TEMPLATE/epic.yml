name: Epic
description: Top-level initiative spanning multiple features
labels: ["epic", "planned"]
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What outcome does this epic deliver?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Features included (add issue refs once created)
  - type: textarea
    id: out_of_scope
    attributes:
      label: Out of Scope
      description: Explicitly excluded from this epic
  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: How do we know it's done?
    validations:
      required: true
  - type: textarea
    id: references
    attributes:
      label: References
      description: |
        Non-numbered markdown list of markdown URLs to relevant files or sections in /docs.
        Each item MUST be a markdown link — plain text paths are not accepted.
        Epics may reference entire documents or first-level headings.

        ✅ Correct:
        - [PRD Overview](./docs/02-technical/PRD.md)
        - [SDS Architecture](./docs/02-technical/sds.md#1-architecture-overview)

        ❌ Incorrect:
        - PRD Overview
        - docs/02-technical/sds.md
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options: ["p0", "p1", "p2", "p3", "p4", "p5"]
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
