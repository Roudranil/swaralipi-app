name: Epic
description: Top-level initiative spanning multiple features
labels: ["epic", "planned"]
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What outcome does this epic deliver?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Features included (add issue refs once created)
  - type: textarea
    id: out_of_scope
    attributes:
      label: Out of Scope
  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options: ["p0", "p1", "p2", "p3", "p4", "p5"]
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
