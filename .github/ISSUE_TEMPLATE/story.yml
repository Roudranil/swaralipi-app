name: Story
description: User-observable slice of a feature
labels: ["story", "planned"]
body:
  - type: input
    id: parent_epic
    attributes:
      label: Parent Epic
      placeholder: "#123"
    validations:
      required: true
  - type: input
    id: parent_feature
    attributes:
      label: Parent Feature
      placeholder: "#123"
    validations:
      required: true
  - type: textarea
    id: user_story
    attributes:
      label: User Story
      description: "As a <role>, I can <action> so that <value>."
    validations:
      required: true
  - type: textarea
    id: tasks
    attributes:
      label: Tasks
      description: Add task issue refs once created (one per line)
  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
    validations:
      required: true
  - type: textarea
    id: references
    attributes:
      label: References
      description: Links to relevant sections or files in /docs (one per line)
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options: ["p0", "p1", "p2", "p3", "p4", "p5"]
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
