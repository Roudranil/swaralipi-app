name: Story
description: User-observable slice of a feature
labels: ["story", "planned"]
body:
  - type: input
    id: parent_epic
    attributes:
      label: Parent Epic
      placeholder: "#123"
    validations:
      required: true
  - type: input
    id: parent_feature
    attributes:
      label: Parent Feature
      placeholder: "#123"
    validations:
      required: true
  - type: textarea
    id: user_story
    attributes:
      label: User Story
      description: "As a <role>, I can <action> so that <value>."
    validations:
      required: true
  - type: textarea
    id: tasks
    attributes:
      label: Tasks
      description: Add task issue refs once created (one per line)
  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
    validations:
      required: true
  - type: textarea
    id: references
    attributes:
      label: References
      description: |
        Non-numbered markdown list of markdown URLs to relevant files or sections in /docs.
        Each item MUST be a markdown link — plain text paths are not accepted.
        Stories must reference specific headings and subheadings (not entire documents).
        The list must be detailed enough that a developer understands the full context of the user-observable slice.

        ✅ Correct:
        - [SDS §3.2 Repository Layer](./docs/02-technical/sds.md#32-repository-layer)
        - [UX Flows — Notation Capture Screen](./docs/02-technical/ux-flows.md#notation-capture-screen)
        - [Data Model — Notation entity](./docs/02-technical/data-model.md#notation)

        ❌ Incorrect:
        - SDS section 3.2
        - docs/02-technical/ux-flows.md (entire doc — too broad for a story)
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options: ["p0", "p1", "p2", "p3", "p4", "p5"]
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
