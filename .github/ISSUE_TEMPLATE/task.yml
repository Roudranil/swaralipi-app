name: Task
description: Atomic technical work item
labels: ["task", "planned"]
body:
  - type: input
    id: parent_story
    attributes:
      label: Parent Story
      placeholder: "#123"
    validations:
      required: true
  - type: textarea
    id: what
    attributes:
      label: What
      description: Concise technical description
    validations:
      required: true
  - type: textarea
    id: definition_of_done
    attributes:
      label: Definition of Done
      value: "- [ ] Tests written and passing\n- [ ] Coverage ≥ 80%\n- [ ] flutter analyze clean\n- [ ] dart format applied\n- [ ] PR opened and linked"
    validations:
      required: true
  - type: textarea
    id: references
    attributes:
      label: References
      description: Links to relevant sections or files in /docs (one per line)
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options: ["p0", "p1", "p2", "p3", "p4", "p5"]
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
