name: swaralipi
description: Digitize and navigate hand-written sargam notations.
publish_to: none

version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter

  # Database
  drift: ^2.32.1
  drift_flutter: ^0.3.0
  sqlite3: ^3.3.1

  # State management & DI
  provider: ^6.1.2

  # Navigation
  go_router: ^17.2.2

  # Serialization
  json_annotation: ^4.9.0

  # Storage
  path_provider: ^2.1.4
  path: ^1.9.0

  # Image processing
  image: ^4.2.0

  # Camera & Gallery
  image_picker: ^1.1.2

  # UI
  google_fonts: ^8.0.2
  flutter_svg: ^2.0.10+1
  material_symbols_icons: ^4.2928.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.12
  json_serializable: ^6.8.0
  drift_dev: ^2.32.1
  mockito: ^5.4.4
  crypto: ^3.0.7

flutter:
  uses-material-design: true
